{% extends 'staff/base.html' %}
{% block title %}Academic Periods{% endblock %}
{% block content %}
<h2>Academic Periods</h2>
<a class="btn btn-primary" href="{% url 'staff_teachers:academic-period-add' %}">Add Course</a><span></span>
<ul class="list-group">
    {% for period in object_list %}
        <li class="list-group-item">
            {{ period.academic_year }} - Semester {{ period.semester }}
        </li>
    {% endfor %}
</ul>
{% endblock %}
