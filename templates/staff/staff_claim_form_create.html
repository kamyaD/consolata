

{% extends 'home/base2.html' %}
{% load static %}


{% block extracss %}
<link rel="stylesheet" href="{% static 'assets/libs/datatables.net-bs5/css/dataTables.bootstrap5.min.css' %}">
{% endblock %}

{% block objectives %}active{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <div class="card">
            <div class="table-responsive">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h2 class="card-title">Teachers Claim Form</h2>
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            
                    
                        </div>
                    </div>
                    
                    <form method="post" action="{% url 'staff_teachers:staff-claim-form' %}">
                        {% csrf_token %}
                    
                        <div class="card card-body p-4 bg-white">
                          <div class="row mb-3">
                            <div class="col-md-6">
                              <label for="staff_name">Staff Name</label>
                              <input type="text" name="staff_name" class="form-control" value="{{ user.first_name }} {{ user.last_name }}">

                            </div>
                            <div class="col-md-6">
                              <label for="month">Month</label>
                              <select name="month" id="month" class="form-control" required>
                                {% for choice in form.month.field.choices %}
                                  <option value="{{ choice.0 }}" {% if choice.0 == form.month.value %}selected{% endif %}>
                                    {{ choice.1 }}
                                  </option>
                                {% endfor %}
                            </select>
                            </div>
                          </div>
                    
                          <table class="table table-striped table-bordered display text-nowrap">
                            <thead class="thead-dark">
                              <tr>
                                <th>ITEM</th>
                                <th>DESCRIPTION</th>
                                <th>QUANTITY</th>
                                <th>RATE</th>
                                <th>TOTAL</th>
                              </tr>
                            </thead>
                            <tbody id="claim-rows">
                              <!-- Example Row 1 -->
                              <tr>
                                <td><input type="text" name="category[]" class="form-control" value="Hours"></td>
                                <td><input type="hidden" name="description[]" class="form-control" value="" readonly></td>
                                <td><input type="number" name="quantity[]" class="form-control qty" value="0"></td>
                                <td><input type="number" name="rate[]" class="form-control rate" value="2000"></td>
                                <td><input type="text" class="form-control total" readonly></td>
                              </tr>
                              <!-- Example Row 2 -->
                              <tr>
                                <td><input type="text" name="category[]" class="form-control" value="Meetings"></td>
                                <td><input type="text" name="description[]" class="form-control" value=""></td>
                                <td><input type="number" name="quantity[]" class="form-control qty" value="0"></td>
                                <td><input type="number" name="rate[]" class="form-control rate" value="1500"></td>
                                <td><input type="text" class="form-control total" readonly></td>
                              </tr>
                              <td colspan="5" class="text-center font-weight-bold bg-white">
                                <h4>Invigilation Of Final Exams</h4>
                              </td>
                              <tr>
                                <td><input type="text" name="category[]" class="form-control" value="Course"></td>
                                <td><input type="text" name="description[]" class="form-control" value="Core Courses"></td>
                                <td><input type="number" name="quantity[]" class="form-control qty" value="0"></td>
                                <td><input type="number" name="rate[]" class="form-control rate" value="4000"></td>
                                <td><input type="text" class="form-control total" readonly></td>
                              </tr>
                              <tr>
                                <td><input type="text" name="category[]" class="form-control" value="Course"></td>
                                <td><input type="text" name="description[]" class="form-control" value="Elective Course"></td>
                                <td><input type="number" name="quantity[]" class="form-control qty" value="0"></td>
                                <td><input type="number" name="rate[]" class="form-control rate" value="2000"></td>
                                <td><input type="text" class="form-control total" readonly></td>
                              </tr>
                              <tr>
                                <td><input type="text" name="category[]" class="form-control" value="Marking of Cats"></td>
                                <td><input type="text" name="description[]" class="form-control" value="No. of scripts"></td>
                                <td><input type="number" name="quantity[]" class="form-control qty" value="0"></td>
                                <td><input type="number" name="rate[]" class="form-control rate" value="50"></td>
                                <td><input type="text" class="form-control total" readonly></td>
                              </tr>
                              <tr>
                                <td><input type="text" name="category[]" class="form-control" value="Marking final exams"></td>
                                <td><input type="text" name="description[]" class="form-control" value="No. of scripts"></td>
                                <td><input type="number" name="quantity[]" class="form-control qty" value="0"></td>
                                <td><input type="number" name="rate[]" class="form-control rate" value="200"></td>
                                <td><input type="text" class="form-control total" readonly></td>
                              </tr>
                            </tbody>
                            <tfoot>
                                <tr>
                                  <td colspan="4" class="text-end"><strong>Grand Total:</strong></td>
                                  <td><strong><span id="grand-total">0</span> KES</strong></td>
                                  <input type="hidden" id="grand-total-input" name="grand-total-input" class="form-control total" value="">
                                </tr>
                              </tfoot>
                          </table>
                    
                          
                    
                          <div class="form-group">
                            <label for="comments"><strong>Comments</strong></label>
                            <textarea name="comments" rows="4" class="form-control"></textarea>
                          </div>
                    
                          <button type="submit" class="btn btn-primary btn-block mt-4">Submit Claim</button>
                        </div>
                      </form>
                </div>
            </div>
        </div>
    </div>
</div>


<script src="{% static 'assets/js/vendor.min.js' %}"></script>
<script src="{% static 'assets/libs/datatables.net/js/jquery.dataTables.min.js' %}"></script>
<script src="{% static 'assets/js/datatable/datatable-basic.init.js' %}"></script>
<script>
  function calculateTotals() {
    let grandTotal = 0;
    const grandtotalInput = document.getElementById('grand-total-input');

    document.querySelectorAll('#claim-rows tr').forEach(row => {
      const qtyInput = row.querySelector('.qty');
      const rateInput = row.querySelector('.rate');
      const totalInput = row.querySelector('.total');
      

      // Skip rows without valid inputs
      if (!qtyInput || !rateInput || !totalInput) return;

      const qty = parseFloat(qtyInput.value) || 0;
      const rate = parseFloat(rateInput.value) || 0;
      const total = qty * rate;

      totalInput.value = total.toFixed(2);
      grandTotal += total;
    });

    document.getElementById('grand-total').textContent = grandTotal.toFixed(2);
    grandtotalInput.value = grandTotal.toFixed(2);
  }

  document.addEventListener('input', function (e) {
    if (e.target.classList.contains('qty') || e.target.classList.contains('rate')) {
      calculateTotals();
    }
  });

  document.addEventListener('DOMContentLoaded', calculateTotals);

  // Calculate on load
  document.addEventListener('DOMContentLoaded', calculateTotals);

    $(document).ready(function() {
        $('#biannual_appraisals').DataTable({
            "order": [[ 1, "desc" ]]  // Order by the Period column (4th column)
        });
    });

</script>

{% endblock %}
