{% extends "staff/base.html" %}
{% block content %}
<h2>Delete Transcript</h2>
<p>Are you sure you want to delete the transcript for <strong>{{ object.student }}</strong>?</p>
<form method="post">
    {% csrf_token %}
    <button class="btn btn-danger">Delete</button>
    <a href="{% url 'staff_teachers:transcript-list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
